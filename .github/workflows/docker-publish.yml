# Required secrets (Settings → Secrets and variables → Actions → Secrets):
#   DOCKERHUB_USERNAME — Docker Hub account login username
#   DOCKERHUB_TOKEN    — Docker Hub access token (Read/Write scope)
#                        Create at: hub.docker.com → Account Settings → Security
name: Publish Docker images

on:
  # Runs after Release workflow completes — ensures PyPI package exists before Docker build.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Manual trigger for re-runs or hotfixes after PyPI publish.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. v0.12.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  # Resolve the git tag regardless of trigger source.
  resolve-ref:
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_run: head_branch contains the tag name for tag-triggered runs
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build ${{ matrix.target }} (${{ matrix.platform }})
    needs: resolve-ref
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        target: [runtime-slim, runtime-full]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            platform_pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          ref_tag="${{ needs.resolve-ref.outputs.tag }}"
          pip_version="${ref_tag#v}"
          if [ "${{ matrix.target }}" = "runtime-slim" ]; then
            ghcr_version="ghcr.io/liorrr/mltk:${ref_tag}"
            ghcr_moving="ghcr.io/liorrr/mltk:latest"
            dh_version="liorrr/mltk:${ref_tag}"
            dh_moving="liorrr/mltk:latest"
          else
            ghcr_version="ghcr.io/liorrr/mltk:${ref_tag}-full"
            ghcr_moving="ghcr.io/liorrr/mltk:full"
            dh_version="liorrr/mltk:${ref_tag}-full"
            dh_moving="liorrr/mltk:full"
          fi
          {
            echo "ghcr_version=${ghcr_version}"
            echo "ghcr_moving=${ghcr_moving}"
            echo "dh_version=${dh_version}"
            echo "dh_moving=${dh_moving}"
            echo "pip_version=${pip_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.platform }}, ${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ steps.tags.outputs.ghcr_version }}-${{ matrix.platform_pair }}
            ${{ steps.tags.outputs.ghcr_moving }}-${{ matrix.platform_pair }}
            ${{ steps.tags.outputs.dh_version }}-${{ matrix.platform_pair }}
            ${{ steps.tags.outputs.dh_moving }}-${{ matrix.platform_pair }}
          # Pin to the exact released version — build fails loudly if PyPI doesn't have it yet.
          build-args: |
            MLTK_PIP_TARGET=mltk[all]==${{ steps.tags.outputs.pip_version }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.platform_pair }}

  manifest:
    name: Create multi-arch manifest (${{ matrix.target }})
    needs: [resolve-ref, build-and-push]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [runtime-slim, runtime-full]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          ref_tag="${{ needs.resolve-ref.outputs.tag }}"
          if [ "${{ matrix.target }}" = "runtime-slim" ]; then
            ghcr_version="ghcr.io/liorrr/mltk:${ref_tag}"
            ghcr_moving="ghcr.io/liorrr/mltk:latest"
            dh_version="liorrr/mltk:${ref_tag}"
            dh_moving="liorrr/mltk:latest"
          else
            ghcr_version="ghcr.io/liorrr/mltk:${ref_tag}-full"
            ghcr_moving="ghcr.io/liorrr/mltk:full"
            dh_version="liorrr/mltk:${ref_tag}-full"
            dh_moving="liorrr/mltk:full"
          fi
          {
            echo "ghcr_version=${ghcr_version}"
            echo "ghcr_moving=${ghcr_moving}"
            echo "dh_version=${dh_version}"
            echo "dh_moving=${dh_moving}"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push GHCR version manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.tags.outputs.ghcr_version }}" \
            "${{ steps.tags.outputs.ghcr_version }}-linux-amd64" \
            "${{ steps.tags.outputs.ghcr_version }}-linux-arm64"

      - name: Create and push GHCR moving-tag manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.tags.outputs.ghcr_moving }}" \
            "${{ steps.tags.outputs.ghcr_moving }}-linux-amd64" \
            "${{ steps.tags.outputs.ghcr_moving }}-linux-arm64"

      - name: Create and push Docker Hub version manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.tags.outputs.dh_version }}" \
            "${{ steps.tags.outputs.dh_version }}-linux-amd64" \
            "${{ steps.tags.outputs.dh_version }}-linux-arm64"

      - name: Create and push Docker Hub moving-tag manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.tags.outputs.dh_moving }}" \
            "${{ steps.tags.outputs.dh_moving }}-linux-amd64" \
            "${{ steps.tags.outputs.dh_moving }}-linux-arm64"
