# STEALTH MODE: Build + test only. No publishing.
# When ready to publish, add PyPI upload steps here.
name: Release
on:
  push:
    tags: ['v*']

jobs:
  wheels:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  test-wheels:
    needs: [wheels, sdist]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Install from wheel
        shell: bash
        run: |
          pip install dist/*.whl || pip install dist/*.tar.gz
          pip install pytest scipy
      - name: Verify import and version
        run: python -c "import mltk; print(mltk.__version__)"
      - name: Run bridge smoke test
        run: python -m pytest tests/test_rust_bridge.py -q

  # STEALTH MODE: TestPyPI only. No production PyPI publish.
  test-pypi:
    needs: [test-wheels]
    runs-on: ubuntu-latest
    # Only run on tags, not every push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/simple/
          skip-existing: true
      - name: Verify TestPyPI install
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ mltk
          python -c "import mltk; print(f'TestPyPI: mltk v{mltk.__version__}')"
