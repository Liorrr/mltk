name: Release
on:
  push:
    tags: ['v*']

jobs:
  wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  test-wheels:
    needs: [wheels, sdist]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]  # x86_64 smoke test only
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Install from wheel
        shell: bash
        run: |
          pip install dist/*.whl || pip install dist/*.tar.gz
          pip install pytest scipy
      - name: Verify import and version
        run: python -c "import mltk; print(mltk.__version__)"
      - name: Run bridge smoke test
        run: python -m pytest tests/test_rust_bridge.py -q

  # Publishes to TestPyPI on every tag push.
  # Requires Trusted Publisher configured at test.pypi.org (project: mlspec, owner: Liorrr,
  # repo: mltk, workflow: release.yml) before the first tag push.
  # Note: docs still reference `pip install mltk` while PEP 541 claim (mltk name) is pending.
  test-pypi:
    needs: [test-wheels]
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # Publishes to production PyPI after TestPyPI succeeds.
  # Requires Trusted Publisher configured at pypi.org:
  #   Project: mlspec | Owner: Liorrr | Repo: mltk | Workflow: release.yml | Env: pypi
  # Also requires a "pypi" GitHub Actions environment in repo Settings > Environments.
  pypi:
    needs: [test-pypi]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
