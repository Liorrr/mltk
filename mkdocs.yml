site_name: "mltk — ML Test Kit"
site_url: https://liorrr.github.io/mltk
repo_url: https://github.com/Liorrr/mltk
repo_name: Liorrr/mltk
site_description: "pytest for ML — unified testing across the entire ML lifecycle"

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Guides:
      - Getting Started: getting-started.md
      - QA Engineer Guide: guides/qa-engineer-guide.md
      - DevOps Guide: guides/devops-guide.md
      - Developer Guide: guides/developer-guide.md
      - Product Manager Guide: guides/product-manager-guide.md
      - CI/CD Integration: guides/cicd-integration.md
      - Security Guide: guides/security-guide.md
      - Canary Testing: guides/canary-testing.md
      - VS Code Integration: guides/vscode-integration.md
      - Playwright Integration: guides/playwright-integration.md
      - YAML Test Definitions: api/yaml-tests.md
      - Data Contracts: api/contracts.md
      - Testing Patterns: api/testing-patterns.md
      - CLI Reference: api/cli.md
      - pytest Plugin: api/pytest-plugin.md
      - HTML Reports: api/report.md
      - ML Test Score: api/ml-test-score.md
      - mltk doctor: api/doctor.md
      - Server Platform: api/server-platform.md
