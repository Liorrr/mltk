site_name: "mltk — ML Test Kit"
site_url: https://liorrr.github.io/mltk
repo_url: https://github.com/Liorrr/mltk
repo_name: Liorrr/mltk
site_description: "pytest for ML — unified testing across the entire ML lifecycle"

docs_dir: .

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - API Reference:
      - Core: api/core.md
      - Data Schema: api/data-schema.md
      - Data Distribution: api/data-distribution.md
      - Data Freshness: api/data-freshness.md
      - Data Drift: api/data-drift.md
      - Data PII: api/data-pii.md
      - Data Labels: api/data-labels.md
      - Model Metrics: api/model-metrics.md
      - Model Regression: api/model-regression.md
      - Model Slicing: api/model-slicing.md
      - Model Bias: api/model-bias.md
      - Model Adversarial: api/model-adversarial.md
      - Inference Latency: api/inference-latency.md
      - Inference Throughput: api/inference-throughput.md
      - Inference Contract: api/inference-contract.md
      - Pipeline: api/pipeline.md
  - Domain Kits:
      - Computer Vision: api/cv.md
      - NLP: api/nlp.md
      - Speech: api/speech.md
      - Tabular: api/tabular.md
      - Monitoring: api/monitor.md
  - Guides:
      - pytest Plugin: api/pytest-plugin.md
      - CLI: api/cli.md
      - HTML Reports: api/report.md
      - ML Test Score: api/ml-test-score.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
